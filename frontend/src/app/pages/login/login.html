<section class="login">
  <div class="login-bg"></div>

  <div class="login-shell">
    <a routerLink="/" class="back-home">
      <lucide-icon [img]="icons.ArrowLeft" class="back-icon"></lucide-icon>
      <span>Back to Home</span>
    </a>

    <div class="brand">
      <div class="brand-logo-wrap">
        <img src="logo.png" alt="LingkodHub Logo" class="brand-logo" />
      </div>

      <div class="brand-text">
        <h1>Lingkod<span>Hub</span></h1>
        <p>Angeles City</p>
      </div>
    </div>

    <div class="login-container">
      <div class="login-head">
        <span class="badge">Welcome Back</span>
        <h2>Sign In</h2>
        <p>Login to your LingkodHub account to access digital barangay services.</p>
      </div>

      <form (ngSubmit)="login()" #loginForm="ngForm">
        <div class="input-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            [(ngModel)]="user.email"
            name="email"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            [(ngModel)]="user.password"
            name="password"
            required
          />
        </div>

        <button type="submit" class="login-btn">
          Sign In
        </button>
      </form>

      <p class="register-link">
        Don’t have an account?
        <a routerLink="/register">Register</a>
      </p>
    </div>
  </div>
</section>
